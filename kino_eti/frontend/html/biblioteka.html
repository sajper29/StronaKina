<!DOCTYPE html>
<html lang="pl_PL">
<head>
    <meta charset="UTF-8">
    <title>ETIKINO – Biblioteka Filmów</title>
    <meta name="keywords" content="kino,eti,ETI,internet,biblioteka filmowa">
    <meta name="description" content="Biblioteka filmów w ETIKINO">
    <meta name="author" content="Maślanka Szymon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/css/biblioteka.css" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="/img/logo.png">
</head>

<body>

<div id="regNotification" class="notification"></div>

<header>
    <div class="container-fluid headercolor">
        <div class="d-flex justify-content-center align-items-center gap-4 flex-wrap">
            <img src="/img/logo.png" class="img-fluid" style="height: 70px; width: auto;">
            <h1 class="headertext1 mb-0">Kino</h1>

            <div class="col justify-content-start" id="listbtns">
                <ol class="listag d-flex align-items-center mb-0">
                    <li><a href="client.html" class="header-btn">Strona główna</a></li>

                    <li id="accountMenuItem" style="position:relative;">
                        <div class="account-wrapper">
                            <button id="accountBtn" class="header-btn">Moje konto ▾</button>
                            <div id="accountDropdown" class="account-dropdown" aria-hidden="true">
                                <div class="account-nick">—</div>
                                <hr class="dropdown-sep"/>
                                <button id="openSettingsAdmin" class="admin-only account-action">Panel administratora</button>
                                <button id="openSettingsClient" class="account-action user-only">Ustawienia konta</button>
                                <button id="openReservations" class="account-action">Rezerwacje</button>
                                <button id="wyloguj" class="account-action account-logout">Wyloguj</button>
                            </div>
                        </div>
                    </li>
                </ol>
            </div>

        </div>
    </div>

    <div class="infobar">
        <div class="container-fluid text-center">
            <strong>ETIKINO</strong> — najlepsze kino w Trójmieście • Czynne codziennie od 9:00 do 23:00 • Tel: <strong>123 456 789</strong>
        </div>
    </div>
</header>

<main class="container" >
  <div class="container-fluid sectioncolor1 mb-4">
    <div class="row align-items-center">
        <div class="col"><h1 class="text-start">Biblioteka filmów</h1></div>
    </div>
</div>


<div class="filters-container">

    <input type="text" id="searchInput" placeholder="Szukaj po nazwie…" class="searchbar">

    <select id="genreFilter" class="filter-select">
        <option value="">Gatunek (wszystkie)</option>
    </select>

    <select id="yearFilter" class="filter-select">
        <option value="">Rok (wszystkie)</option>
    </select>


    <div class="view-switch">
        <button class="view-btn active" id="gridViewBtn">▦ Kafelki</button>
        <button class="view-btn" id="listViewBtn">☰ Lista</button>
    </div>
</div>


<div id="playingToggleContainer" class="container-fluid mb-4 ">
    <div class="playing-toggle-box" id="playingToggle"> <div class="playing-switch active" id="playingSwitch"></div>
        <h1 class="playing-title" id="playingTitle">Aktualnie w kinie — WŁ.</h1>
    </div>
</div>
<div id="movieList" class="row g-4 mb-5 view-grid"></div>


</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/biblioteka.js"></script>

</body>
</html>
