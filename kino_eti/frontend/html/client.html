<!DOCTYPE html>
<html lang="pl_PL">
<head>
    <meta charset="UTF-8">
    <title>ETIKINO</title>
    <meta name="keywords" content="kino,eti,ETI,internet,biblioteka filmowa">
    <meta name="description" content="Cinema App">
    <meta name="author" content="Maślanka Szymon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/client.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/logo.png">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<div id="regNotification" class="notification"></div>
<header class="pc-header">
    <div class="container-fluid headercolor">
    <div class="d-flex justify-content-center align-items-center gap-4 flex-wrap">
        <img src="/img/logo.png" class="img-fluid">
        <h1 class="headertext1 mb-0">Kino</h1>
        <div class="col justify-content-start" id="listbtns">
            <ol class="listag d-flex align-items-center mb-0">
             <li><a href="#" id="libraryLink">Biblioteka</a></li>
                <li id="accountMenuItem" style="position:relative;">
                    <div class="account-wrapper">
                        <button id="accountBtn" class="header-btn">Moje konto ▾</button>
                        <div id="accountDropdown" class="account-dropdown" aria-hidden="true">
                            <div class="account-nick">—</div>
                            <hr class="dropdown-sep"/>
                            <button id="openSettingsAdmin" class="admin-only account-action">Panel administratora</button>
                            <button id="openReservations" class="account-action">Rezerwacje</button>
                            <button id="openSettingsClient" class="account-action user-only">Ustawienia konta</button>
                            <button id="wyloguj" class="account-action account-logout">Wyloguj</button>
                        </div>
                    </div>
                </li>
            </ol>
        </div>
    </div>
</div>
<div class="infobar">
    <div class="container-fluid text-center">
        <strong>ETIKINO</strong> — najlepsze kino w Trójmieście • Czynne codziennie od 9:00 do 23:00 • Tel: <strong>123 456 789</strong>
    </div>
</div>
</header>

<header class="mobile-header">
    <div class="m-header-main d-flex justify-content-between align-items-center px-3">
        <!-- Lewa część: logo i tytuł -->
        <div class="m-left d-flex align-items-center gap-3">
            <img src="/img/logo.png" class="m-logo">
            <h1 class="m-title mb-0">Kino</h1>
        </div>

        <!-- Hamburger -->
        <button class="hamburger" id="hamburger">☰</button>
    </div>

    <!-- Menu rozwijane -->
    <nav class="m-nav" id="m-nav">
        <a href="#" id="libraryLinkMobile" class="m-link">Biblioteka</a>

        <!-- Konto -->
        <div id="accountMenuItemMobile" style="position:relative;">
            <div class="account-wrapper">
                <button id="accountBtnMobile" class="header-btn">Moje konto ▾</button>
                <div id="accountDropdownMobile" class="account-dropdown" aria-hidden="true">
                    <div class="account-nick">—</div>
                    <hr class="dropdown-sep"/>
                    <button id="openReservationsMobile" class="account-action">Rezerwacje</button>
                    <button id="openSettingsMobile" class="account-action">Ustawienia konta</button>
                    <button id="wylogujMobile" class="account-action account-logout">Wyloguj</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Infobar -->
    <div class="m-infobar">
        <strong>ETIKINO</strong> — najlepsze kino w Trójmieście • 9:00–23:00 • Tel: <strong>123 456 789</strong>
    </div>
</header>

<div id="carouselExampleIndicators" class="carousel slide" style="margin-top: 15vh;">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
    </div>
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="../img/baner.jpg" class="d-block w-100" alt="Film 1">
        </div>
        <div class="carousel-item">
            <img src="https://image.tmdb.org/t/p/original/8YFL5QQVPy3AgrEQxNYVSgiPEbe.jpg" class="d-block w-100" alt="Film 2">
        </div>
        <div class="carousel-item">
            <img src="https://www.themoviedb.org/t/p/w1280/rc4oXn6mQ1KSwXJo190bFulvHtB.jpg" class="d-block w-100" alt="Film 3">
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>

<!-- Karuzele filmowe -->
<section class="film-carousel my-5">
    <div class="container-fluid sectioncolor1 mb-2 mt-4">
        <div class="row align-items-center"><div class="col"><h1 class="text-start">Na ekranie</h1></div></div>
    </div>
    <div class="carousel-container">
        <button class="carousel-btn prev">‹</button>
        <div class="carousel-track" id="now_playing"></div>
        <button class="carousel-btn next">›</button>
    </div>
</section>

<section class="film-carousel my-5">
    <div class="container-fluid sectioncolor1 mb-2 mt-4">
        <div class="row align-items-center"><div class="col"><h1 class="text-start">Wkrótce</h1></div></div>
    </div>
    <div class="carousel-container">
        <button class="carousel-btn prev">‹</button>
        <div class="carousel-track" id="coming_soon"></div>
        <button class="carousel-btn next">›</button>
    </div>
</section>

<section class="film-carousel my-5">
    <div class="container-fluid sectioncolor1 mb-2 mt-4">
        <div class="row align-items-center"><div class="col"><h1 class="text-start">Dla rodzin</h1></div></div>
    </div>
    <div class="carousel-container">
        <button class="carousel-btn prev">‹</button>
        <div class="carousel-track" id="family"></div>
        <button class="carousel-btn next">›</button>
    </div>
</section>

<section class="film-carousel my-5">
    <div class="container-fluid sectioncolor1 mb-2 mt-4">
        <div class="row align-items-center"><div class="col"><h1 class="text-start">Akcji</h1></div></div>
    </div>
    <div class="carousel-container">
        <button class="carousel-btn prev">‹</button>
        <div class="carousel-track" id="action"></div>
        <button class="carousel-btn next">›</button>
    </div>
</section>

<section class="sekcja3">
    <div class="container-fluid d-flex justify-content-center mb-20">
        <button type="button" class="btn btn-primary mx-auto buttonlos" onclick="zmien()">Kup bilet</button>
    </div>
</section>

<script src="/js/client.js"></script>
</body>
</html>
