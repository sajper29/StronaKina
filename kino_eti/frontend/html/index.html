<!DOCTYPE html>
<html lang="pl_PL">
<head>
    <meta charset="UTF-8">
    <title>ETIKINO</title>

    <meta name="description" content="Cinema App">
    <meta name="author" content="Maślanka Szymon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="/css/index.css" rel="stylesheet">

</head>
<body>
<div id="scale-root">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    

<div id="regNotification" class="notification"></div>


<header class="pc-header">
        <div class="container-fluid headercolor">
          <div class="d-flex justify-content-center align-items-center gap-4 flex-wrap">
            <img src="/img/logo.png" class="img-fluid">
            <h1 class="headertext1 mb-0">Kino</h1>
            <div class="col justify-content-start" id="listbtns">
            <ol class="listag d-flex align-items-center mb-0" id="listbtns">
             <li><a href="#" id="libraryLink">Biblioteka</a></li>
              <li><button onclick="toggleForm('login')" id="logbutton">Zaloguj</button></li>
              <li><button onclick="toggleForm('register')" id="regbutton">Zarejestruj</button></li>
            </ol>
            </div>
          </div>
        </div>
        <div class="infobar">
          <div class="container-fluid text-center justify-content-center">
            <strong>ETIKINO</strong> — najlepsze kino w Trójmieście • Czynne codziennie od 9:00 do 23:00 • Tel: <strong>123 456 789</strong>
        </div>
</div>
</header>

<header class="mobile-header">
    <div class="m-header-main">
        <div class="m-left">
            <img src="/img/logo.png" class="m-logo">
            <h1 class="m-title">Kino</h1>
        </div>

        <button class="hamburger" id="hamburger">☰</button>
    </div>

    <nav class="m-nav" id="m-nav">
        <a href="#" id="libraryLinkMobile" class="m-link">Biblioteka</a>
        <button onclick="toggleForm('login')" class="m-btn-log">Zaloguj</button>
        <button onclick="toggleForm('register')" class="m-btn-reg">Zarejestruj</button>
    </nav>

    <div class="m-infobar">
        <strong>ETIKINO</strong> — najlepsze kino w Trójmieście • 9:00–23:00 • Tel: <strong>123 456 789</strong>
    </div>
</header>


<div id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
            <img src="../img/baner.jpg" class="d-block w-100" alt="Film 1">
        </div>
        <div class="carousel-item">
            <img src="https://image.tmdb.org/t/p/original/8YFL5QQVPy3AgrEQxNYVSgiPEbe.jpg" class="d-block w-100" alt="Film 2">
        </div>
    <div class="carousel-item">
      <img src="https://www.themoviedb.org/t/p/w1280/rc4oXn6mQ1KSwXJo190bFulvHtB.jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>






<section class="film-carousel my-5">
  <div class="container-fluid sectioncolor1 mb-2 mt-4">
    <div class="row align-items-center">
      <div class="col">
        <h1 class="text-start">Na ekranie</h1>
      </div>
    </div>
  </div>
  <div class="carousel-container">
    <button class="carousel-btn prev">‹</button>
    <div class="carousel-track" id="now_playing"></div>
    <button class="carousel-btn next">›</button>
  </div>
</section>


<section class="film-carousel my-5">
  <div class="container-fluid sectioncolor1 mb-2 mt-4">
    <div class="row align-items-center">
      <div class="col">
        <h1 class="text-start">Wkrótce</h1>
      </div>
    </div>
  </div>
  <div class="carousel-container">
    <button class="carousel-btn prev">‹</button>
    <div class="carousel-track" id="coming_soon"></div>
    <button class="carousel-btn next">›</button>
  </div>
</section>

<section class="film-carousel my-5">
  <div class="container-fluid sectioncolor1 mb-2 mt-4">
    <div class="row align-items-center">
      <div class="col">
        <h1 class="text-start">Dla rodzin</h1>
      </div>
    </div>
  </div>
  <div class="carousel-container">
    <button class="carousel-btn prev">‹</button>
    <div class="carousel-track" id="family"></div>
    <button class="carousel-btn next">›</button>
  </div>
</section>


<section class="film-carousel my-5">
  <div class="container-fluid sectioncolor1 mb-2 mt-4">
    <div class="row align-items-center">
      <div class="col">
        <h1 class="text-start">Akcji</h1>
      </div>
    </div>
  </div>
  <div class="carousel-container">
    <button class="carousel-btn prev">‹</button>
    <div class="carousel-track" id="action"></div>
    <button class="carousel-btn next">›</button>
  </div>
</section>

    <section class="sekcja3">
        <div class="container-fluid d-flex justify-content-center mb-20">
            <button type="button" class="btn btn-primary mx-auto buttonlos" onclick="zmien()">Kup bilet</button>
        </div>
    </section>
   
  <div id="login" style="display:none;">
  <form id="loginForm" onsubmit="return false;">
    <h2>Logowanie</h2>

    <div class="form-group">
      <label for="loginUname">Nazwa użytkownika</label>
      <input type="text" name="uname" id="loginUname" placeholder="Wpisz nazwę użytkownika">
    </div>

    <div class="form-group">
      <label for="loginPsw">Hasło</label>
      <input type="password" name="psw" id="loginPsw" placeholder="Wpisz hasło">
    </div>
    <div id="loginError"></div>
    <button type="button" id="loginBtn">Zaloguj się</button>

  </form>

  <div class="cancelbtn">
    <button type="button" onclick="document.getElementById('login').style.display='none'">Anuluj</button>
  </div>
</div>

<div id="register" style="display:none;">
  <form id="registerForm">
    <h2>Rejestracja</h2>

    <div class="form-group">
      <label for="uname">Nazwa użytkownika</label>
      <input type="text" name="uname" id="uname" placeholder="Wpisz nazwę użytkownika">
    </div>

    <div class="form-group">
      <label for="email">Adres e-mail</label>
      <input type="email" name="email" id="email" placeholder="Wpisz adres e-mail">
    </div>

    <div class="form-group">
      <label for="psw">Hasło</label>
      <input type="password" name="psw" id="psw" placeholder="Wpisz hasło">
    </div>

    <div class="form-group">
      <label for="pswConfirm">Powtórz hasło</label>
      <input type="password" name="pswConfirm" id="pswConfirm" placeholder="Powtórz hasło">
    </div>
    <div id="regError"></div>
    <button type="button" id="registerBtn">Zarejestruj</button>

  </form>

  <div class="cancelbtn">
      <button type="button" onclick="document.getElementById('register').style.display='none'">Anuluj</button>
  </div>
</div>

</div>

<script src="/js/index.js"></script>

</body>

</html>
